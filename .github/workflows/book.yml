name: Book

# The book build compiles every ```mensura example through the
# `mensura-mdbook` preprocessor, so it must also run when the compiler crates
# or build config change, not only when book content does.
on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/book.yml'
  pull_request:
    paths:
      - 'book/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/book.yml'

# Allow one concurrent deployment; cancel superseded in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      # Build the preprocessor up front so `mdbook build` (which invokes it via
      # `cargo run`) does not pay for the compile mid-build.
      - name: Build preprocessor
        run: cargo build --package mensura-mdbook
      # Building the book runs mdbook-mensura, which fails here if any
      # ```mensura example stops compiling.
      - name: Build book
        run: mdbook build book
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: book/book

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
